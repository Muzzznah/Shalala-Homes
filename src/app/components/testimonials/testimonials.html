<section id="testimonials" class="testimonials">
  <div class="testimonials__container">
    <div class="testimonials__intro">
      <span class="eyebrow">What Clients Say</span>
      <h2 class="testimonials__title">Trusted by owners &amp; tenants</h2>
    </div>

    <div class="testimonials__grid">
      @for (t of testimonials; track t.name) {
        <div class="testimonials__card">
          <div class="testimonials__stars">★★★★★</div>
          <p class="testimonials__quote">&ldquo;{{ t.quote }}&rdquo;</p>
          <div class="testimonials__author">{{ t.name }} &nbsp;·&nbsp; {{ t.role }}</div>
        </div>
      }
    </div>
  </div>
</section>
