@if (featured().length > 0) {
  <section id="featured" class="featured">
    <div class="featured__container">

      <div class="featured__intro">
        <span class="eyebrow">Available Now</span>
        <h2 class="featured__title">Featured Rentals</h2>
        <p class="featured__subtitle">
          Browse our latest listings — tap a poster to message us on WhatsApp
          or iMessage for more photos.
        </p>
      </div>

      <div class="featured__grid">
        @for (r of featured(); track r.id) {
          <article class="fposter">
            <div class="fposter__img">
              @if (r.image_url) {
                <img
                  [src]="r.image_url"
                  [alt]="r.address + ' rental poster'"
                  loading="lazy"
                />
              } @else {
                <span class="fposter__addr">{{ r.address }}</span>
              }
            </div>
            <div class="fposter__actions">
              <a [href]="waLink(r)" target="_blank" rel="noopener noreferrer" class="fposter__btn fposter__btn--wa">
                <svg viewBox="0 0 24 24" class="fposter__btn-ico" fill="currentColor">
                  <path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.8.8.8-2.8-.2-.3A8 8 0 1 1 12 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5.1a6.5 6.5 0 0 1-1.9-1.2 7.2 7.2 0 0 1-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4v-.4c0-.1-.5-1.3-.7-1.8s-.4-.4-.5-.4h-.5a1 1 0 0 0-.7.3A2.8 2.8 0 0 0 5 8.6a4.9 4.9 0 0 0 1 2.6 11.2 11.2 0 0 0 4.3 3.8c.6.3 1.1.4 1.5.5a3.5 3.5 0 0 0 1.6.1 2.7 2.7 0 0 0 1.7-1.2 2.1 2.1 0 0 0 .2-1.2c-.1-.1-.2-.1-.4-.2z"/>
                </svg>
                Interested
              </a>
              <a [href]="smsLink(r)" class="fposter__btn fposter__btn--sms">
                <svg viewBox="0 0 24 24" class="fposter__btn-ico" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z" />
                </svg>
                iMessage
              </a>
            </div>
          </article>
        }
      </div>

      <div class="featured__more">
        <a routerLink="/rentals" class="pill pill--dark">View All Rentals</a>
      </div>

    </div>
  </section>
}
