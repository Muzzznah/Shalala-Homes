<section id="contact" class="contact">
  <div class="contact__container">

    <!-- Contact information -->
    <div class="contact__content">
      <div class="contact__intro">
        <span class="eyebrow">Get in touch</span>
        <h2 class="contact__title">Leave a message</h2>
        <p class="contact__subtitle">
          Looking for a home, or want your property managed? Send a note — owners, a quick call is the fastest way to reach us.
        </p>

        <div class="contact__details">
          <div class="contact-detail">
            <div class="contact-detail__icon">
              <svg viewBox="0 0 24 24"><path d="M21 16.9v2.6a1.5 1.5 0 0 1-1.6 1.5A18.2 18.2 0 0 1 3 4.6 1.5 1.5 0 0 1 4.5 3H7a1.5 1.5 0 0 1 1.5 1.3c.1 1.1.4 2.2.8 3.2a1.5 1.5 0 0 1-.3 1.6L8 10a14.3 14.3 0 0 0 6 6l.9-.9a1.5 1.5 0 0 1 1.6-.3c1 .4 2.1.7 3.2.8a1.5 1.5 0 0 1 1.3 1.3Z"/></svg>
            </div>
            <div><a class="contact-detail__title" href="tel:+12269754568">(226) 975-4568</a><p>Mon–Sat, 9am–7pm</p></div>
          </div>
          <div class="contact-detail">
            <div class="contact-detail__icon">
              <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="1.5"/><path d="m4 7 8 6 8-6"/></svg>
            </div>
            <div><a class="contact-detail__title" href="mailto:shalalahomes@gmail.com">shalalahomes&#64;gmail.com</a><p>We reply within 24 hours</p></div>
          </div>
          <div class="contact-detail">
            <div class="contact-detail__icon">
              <svg viewBox="0 0 24 24"><path d="M20 10.5c0 5.3-8 10.5-8 10.5S4 15.8 4 10.5a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10.5" r="2.5"/></svg>
            </div>
            <div><strong class="contact-detail__title">Windsor, Ontario</strong><p>Serving Windsor, LaSalle &amp; Amherstburg</p></div>
          </div>
        </div>
      </div>


      <form
        class="contact__form"
        action="https://formspree.io/f/xzdnelrp"
        method="POST"
      >
        <div class="contact__fields">
          <label for="firstName">
            <span class="sr-only">First name</span>
            <input
              id="firstName"
              type="text"
              name="firstName"
              placeholder="First name *"
              autocomplete="given-name"
              required
              maxlength="80"
            />
          </label>
          <label for="lastName">
            <span class="sr-only">Last name *</span>
            <input
              id="lastName"
              type="text"
              name="lastName"
              placeholder="Last name *"
              autocomplete="family-name"
              required
              maxlength="80"
            />
          </label>

          <label for="email">
            <span class="sr-only">Email</span>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="Email *"
              autocomplete="email"
              required
              maxlength="120"
            />
          </label>

          <label for="phone">
            <span class="sr-only">Phone</span>
            <input
              id="phone"
              type="tel"
              name="phone"
              placeholder="Phone *"
              autocomplete="tel"
              required
              inputmode="tel"
              maxlength="25"
            />
          </label>
        </div>
        <label class="contact__message" for="message">
          <span class="sr-only">Your message</span>
          <textarea
            id="message"
            name="message"
            rows="5"
            placeholder="Tell us what you’re looking for…"
            required
            minlength="10"
            maxlength="1000"
          ></textarea>
        </label>
        <button class="contact__submit" type="submit">Send message</button>
      </form>


    </div>
  </div>
</section>
