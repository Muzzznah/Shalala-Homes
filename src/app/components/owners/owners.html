<section id="owners" class="owners">

    <span class="owners__eyebrow">For Property Owners</span>

    <h2 class="owners__title">Tired of self-management?</h2>

    <p class="owners__copy">
      Let a professional, Windsor-based team keep your property full and your
      tenants looked after. Give us a call and we'll take it from there.
    </p>

    <a [href]="phoneHref" class="pill pill--outline">Call the Office</a>

    <div class="owners__meta">{{ phoneDisplay }} &nbsp;·&nbsp; {{ hours }}</div>
  </div>
</section>
